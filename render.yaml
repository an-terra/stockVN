# Blueprint Render — https://render.com/docs/infrastructure-as-code
# Deploy: Dashboard → Blueprints → New Blueprint Instance → chọn repo + branch chứa file này.
# Hoặc tạo Web Service thủ công (Docker) không bắt buộc dùng file này.

services:
  - type: web
    name: stockvn
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    # Render gán PORT; Express đọc process.env.PORT
    healthCheckPath: /api/watchlist
    envVars:
      - key: AUTH0_DOMAIN
        sync: false
      - key: AUTH0_AUDIENCE
        sync: false
      - key: ADMIN_EMAILS
        value: admin@an-terra.com
      - key: DATABASE_URL
        fromDatabase:
          name: stockvn-db
          property: connectionString

databases:
  - name: stockvn-db
    databaseName: stockvn
    user: stockvn
